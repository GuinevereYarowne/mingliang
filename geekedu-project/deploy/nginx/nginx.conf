server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 前端路由兼容
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 跨域代理（可选，也可前端直接访问8080）
    location /api {
        proxy_pass http://web-server:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}